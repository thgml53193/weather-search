<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/custom.js"></script>
    <!-- 부트스트랩 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <!-- 상단 섹션 - 날씨 검색, 지역 버튼 -->
      <div class="top-section">
        <div class="title-glass-box">
          <div class="main-title">
            <h2>시간의 온도</h2>
            <h3>3시간 간격으로 만나는 오늘의 날씨</h3>
            <p id="location"></p>
          </div>
          <!-- 검색 -->
          <div class="search">
            <input
              type="text"
              id="searchInput"
              class="form-control form-control-lg"
              placeholder="도시를 검색하세요"
            />
            <button type="button" id="searchBtn" class="btn btn-light">
              SEARCH
            </button>
          </div>
          <!-- 지역 버튼 -->
          <div class="region-btns">
            <button
              onclick="weather('Seoul')"
              type="button"
              class="btn btn-light"
            >
              서울
            </button>
            <button
              onclick="weather('Busan')"
              type="button"
              class="btn btn-light"
            >
              부산
            </button>
            <button
              onclick="weather('Incheon')"
              type="button"
              class="btn btn-light"
            >
              인천
            </button>
            <button
              onclick="weather('Jeju')"
              type="button"
              class="btn btn-light"
            >
              제주
            </button>
          </div>
        </div>
      </div>
      <!-- 하단 섹션 -->
      <div class="bottom-section">
        <!-- 3시간 간격 예측 카드 -->
        <ul class="forecast-cards">
          <li>
            <img src="" alt="" />
            <p></p>
            <div class="temp"></div>
          </li>
          <li>
            <img src="" alt="" />
            <p></p>
            <div class="temp"></div>
          </li>
          <li>
            <img src="" alt="" />
            <p></p>
            <div class="temp"></div>
          </li>
          <li>
            <img src="" alt="" />
            <p></p>
            <div class="temp"></div>
          </li>
          <li>
            <img src="" alt="" />
            <p></p>
            <div class="temp"></div>
          </li>
          <li>
            <img src="" alt="" />
            <p></p>
            <div class="temp"></div>
          </li>
          <li>
            <img src="" alt="" />
            <p></p>
            <div class="temp"></div>
          </li>
        </ul>

        <!-- 날씨 차트 -->
        <div class="chart-container">
          <canvas id="weatherChart"></canvas>
        </div>
      </div>
    </div>
  </body>
</html>
